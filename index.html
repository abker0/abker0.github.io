<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Baker</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico"> <!-- Favicon -->
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', 'Arial', sans-serif;
            background-color: #1e1e1e; /* Dark grey background */
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            background-color: #2a2a2a;
            height: 60px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            position: absolute;
            top: 0;
        }

        /* Content */
        .content {
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease-in-out;
        }

        h1:hover {
            transform: scale(1.05);
        }

        h2 {
            font-size: 1.8rem;
            margin: 0.5rem 0;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* Button Styles */
        .button {
            padding: 12px 24px;
            background-color: #ff6347;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #ff4500;
        }

        .button img {
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div class="top-bar"></div>
<div class="content">
    <h1>Work in Progress</h1>
    <h2>Adam Baker</h2>
    <a href="https://github.com/abker0" target="_blank" class="button">
        <img src="https://avatars.githubusercontent.com/u/143620139?v=4" alt="GitHub Profile Picture">
        GitHub Profile
    </a>
</div>
</body>
</html>
